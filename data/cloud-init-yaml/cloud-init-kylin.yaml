#cloud-config
# 麒麟（OpenKylin）cloud-init 配置
# 适用于 OpenKylin V10 GenericCloud 镜像
# 默认用户：kylin 或 openkylin

# 磁盘自动扩容
growpart:
    mode: auto
    devices: ["/"]
    ignore_growroot_disabled: false

# 主机名解析
manage_etc_hosts: true

# 默认用户配置
users:
    - default

