# TencentOS Server（TLinux）Kickstart 无人值守安装配置
# 用途：配合 Packer + QEMU 将 TencentOS ISO 自动安装为 qcow2 cloud image
# 支持：TencentOS Server 2.x（基于 CentOS 7）和 3.x（基于 CentOS Stream 8）
# 与 centos7-ks.cfg 的主要差异：
#   1. %post 中配置腾讯软件源（mirrors.tencent.com/tlinux/）
#   2. 包列表移除了 CentOS 特有的固件包

# ---------- 安装方式 ----------
install
text
skipx
reboot

# ---------- 语言与键盘 ----------
lang en_US.UTF-8
keyboard us
timezone UTC --isUtc

# ---------- 网络 ----------
network --bootproto=dhcp --device=eth0 --onboot=yes --activate
network --hostname=localhost.localdomain

# ---------- 安全 ----------
selinux --disabled
firewall --disabled

# ---------- 认证 ----------
rootpw --plaintext packer-build-only

# ---------- 磁盘分区 ----------
zerombr
clearpart --all --initlabel
bootloader --location=mbr --boot-drive=vda
part /boot --fstype=xfs  --size=512
part /     --fstype=xfs  --size=1 --grow

# ---------- 软件包 ----------
%packages --ignoremissing --excludedocs
@core
openssh-server
sudo
curl
wget
%end

# ---------- 安装后脚本 ----------
%post --log=/root/ks-post.log

# 允许 root 通过 SSH 登录（仅构建阶段）
sed -i 's/^#\?PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
systemctl enable sshd

# 禁用不必要的服务
systemctl disable kdump.service || true
systemctl disable postfix.service || true

# 配置 sudo 免密
echo 'Defaults !requiretty' >> /etc/sudoers

# ---------- 配置腾讯软件源（TencentOS 专用） ----------
# 备份原有 repo 文件
mkdir -p /etc/yum.repos.d/backup
mv /etc/yum.repos.d/*.repo /etc/yum.repos.d/backup/ 2>/dev/null || true

# 检测 TencentOS 版本，写入对应的腾讯软件源
TLINUX_VERSION=$(rpm -q --queryformat '%{VERSION}' tlinux-release 2>/dev/null || echo "2")
MAJOR_VERSION=$(echo "$TLINUX_VERSION" | cut -d. -f1)

if [[ "$MAJOR_VERSION" == "3" ]]; then
  # TencentOS Server 3.x（基于 CentOS Stream 8）
  cat > /etc/yum.repos.d/tlinux3.repo <<'REPOEOF'
[tlinux3-base]
name=TencentOS Server 3 - Base - mirrors.tencent.com
baseurl=https://mirrors.tencent.com/tlinux/3.1/os/x86_64/
gpgcheck=0
enabled=1

[tlinux3-updates]
name=TencentOS Server 3 - Updates - mirrors.tencent.com
baseurl=https://mirrors.tencent.com/tlinux/3.1/updates/x86_64/
gpgcheck=0
enabled=1

[tlinux3-extras]
name=TencentOS Server 3 - Extras - mirrors.tencent.com
baseurl=https://mirrors.tencent.com/tlinux/3.1/extras/x86_64/
gpgcheck=0
enabled=1
REPOEOF
else
  # TencentOS Server 2.x（基于 CentOS 7）
  cat > /etc/yum.repos.d/tlinux2.repo <<'REPOEOF'
[tlinux2-base]
name=TencentOS Server 2 - Base - mirrors.tencent.com
baseurl=https://mirrors.tencent.com/tlinux/2.4/os/x86_64/
gpgcheck=0
enabled=1

[tlinux2-updates]
name=TencentOS Server 2 - Updates - mirrors.tencent.com
baseurl=https://mirrors.tencent.com/tlinux/2.4/updates/x86_64/
gpgcheck=0
enabled=1
REPOEOF
fi

%end
