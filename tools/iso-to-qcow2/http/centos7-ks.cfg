# CentOS 7 Kickstart 无人值守安装配置
# 用途：配合 Packer + QEMU 将 CentOS 7 ISO 自动安装为 qcow2 cloud image
# 注意：此配置仅用于镜像构建阶段，root 密码和 SSH 配置在产出镜像中会被清理

# ---------- 安装方式 ----------
install
text
skipx
reboot

# ---------- 语言与键盘 ----------
lang en_US.UTF-8
keyboard us
timezone UTC --isUtc

# ---------- 网络 ----------
network --bootproto=dhcp --device=eth0 --onboot=yes --activate
network --hostname=localhost.localdomain

# ---------- 安全 ----------
# 禁用 SELinux（避免影响 Multipass 文件挂载等功能）
selinux --disabled
firewall --disabled

# ---------- 认证 ----------
# 构建阶段临时 root 密码（明文，Packer SSH 连接使用）
# 产出镜像中此密码会被 cloud-init 覆盖
rootpw --plaintext packer-build-only

# ---------- 磁盘分区 ----------
zerombr
clearpart --all --initlabel
bootloader --location=mbr --boot-drive=vda
part /boot --fstype=xfs  --size=512
part /     --fstype=xfs  --size=1 --grow

# ---------- 软件包 ----------
%packages --ignoremissing --excludedocs
@core
# 必要工具
openssh-server
sudo
curl
wget
# 移除不必要的包，减小镜像体积
-aic94xx-firmware
-atmel-firmware
-b43-openfwwm
-bfa-firmware
-ipw2100-firmware
-ipw2200-firmware
-ivtv-firmware
-iwl100-firmware
-iwl1000-firmware
-iwl105-firmware
-iwl135-firmware
-iwl2000-firmware
-iwl2030-firmware
-iwl3160-firmware
-iwl3945-firmware
-iwl4965-firmware
-iwl5000-firmware
-iwl5150-firmware
-iwl6000-firmware
-iwl6000g2a-firmware
-iwl6000g2b-firmware
-iwl6050-firmware
-iwl7260-firmware
-libertas-usb8388-firmware
-ql2100-firmware
-ql2200-firmware
-ql23xx-firmware
-ql2400-firmware
-ql2500-firmware
-rt61pci-firmware
-rt73usb-firmware
-xorg-x11-drv-ati-firmware
-zd1211-firmware
%end

# ---------- 安装后脚本 ----------
%post --log=/root/ks-post.log

# 允许 root 通过 SSH 登录（仅构建阶段，Packer 需要 SSH 连接）
sed -i 's/^#\?PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config

# 启用 sshd 服务
systemctl enable sshd

# 禁用不必要的服务，加快启动速度
systemctl disable kdump.service || true
systemctl disable postfix.service || true

# 配置 sudo 免密（cloud-init 需要）
echo 'Defaults !requiretty' >> /etc/sudoers

%end
